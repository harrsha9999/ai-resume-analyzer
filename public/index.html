<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Resume Analyzer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117; color: #e6edf3; padding: 32px; line-height: 1.5; }
    .wrap { max-width: 820px; margin: 0 auto; }
    h1 { font-size: 1.6rem; margin-bottom: 4px; }
    .sub { color: #8b949e; margin-bottom: 24px; font-size: 0.95rem; }
    textarea { width: 100%; min-height: 140px; background: #161b22; color: #e6edf3;
      border: 1px solid #30363d; border-radius: 10px; padding: 12px; font-size: 0.9rem;
      margin-bottom: 14px; resize: vertical; }
    label { display: block; font-size: 0.85rem; color: #8b949e; margin-bottom: 6px; }
    button { background: #238636; color: #fff; border: 0; border-radius: 8px;
      padding: 11px 20px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #2ea043; }
    .result { margin-top: 26px; display: none; }
    .score { font-size: 3rem; font-weight: 800; }
    .score small { font-size: 1rem; color: #8b949e; font-weight: 400; }
    .bar { height: 10px; background: #30363d; border-radius: 999px; overflow: hidden; margin: 10px 0 20px; }
    .bar > div { height: 100%; background: linear-gradient(90deg,#f85149,#d29922,#3fb950); }
    .chips { display: flex; flex-wrap: wrap; gap: 7px; margin: 8px 0 18px; }
    .chip { padding: 5px 11px; border-radius: 999px; font-size: 0.8rem; border: 1px solid #30363d; }
    .chip.miss { color: #f85149; border-color: #f8514955; }
    .chip.match { color: #3fb950; border-color: #3fb95055; }
    ul { margin-left: 18px; } li { margin-bottom: 6px; }
    h3 { font-size: 0.95rem; margin: 16px 0 6px; }
    footer { margin-top: 32px; color: #8b949e; font-size: 0.85rem; }
    a { color: #58a6ff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>AI Resume Analyzer</h1>
    <div class="sub">Paste your resume and a job description to get an ATS-style score, skill gaps, and suggestions.</div>

    <label>Resume text</label>
    <textarea id="resume" placeholder="Paste your resume here..."></textarea>

    <label>Job description</label>
    <textarea id="jd" placeholder="Paste the target job description here..."></textarea>

    <button id="go">Analyze</button>

    <div class="result" id="result">
      <div class="score" id="score">0<small>/100 ATS match</small></div>
      <div class="bar"><div id="barFill" style="width:0%"></div></div>

      <h3>Matched keywords</h3>
      <div class="chips" id="matched"></div>

      <h3>Missing keywords</h3>
      <div class="chips" id="missing"></div>

      <h3>Suggestions</h3>
      <ul id="suggestions"></ul>
    </div>

    <footer>Built by <a href="https://linkedin.com/in/haarsha9999">Harsha Vardhan G</a> ·
      <a href="https://github.com/harrsha9999/ai-resume-analyzer">Source</a></footer>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    $("go").onclick = async () => {
      const resume = $("resume").value.trim();
      const jobDescription = $("jd").value.trim();
      if (!resume || !jobDescription) { alert("Please fill in both fields."); return; }

      const res = await fetch("/api/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ resume, jobDescription }),
      });
      const data = await res.json();
      if (!res.ok) { alert(data.error || "Error"); return; }

      $("result").style.display = "block";
      $("score").innerHTML = data.score + '<small>/100 ATS match</small>';
      $("barFill").style.width = data.score + "%";

      const chips = (arr, cls) => arr.length
        ? arr.map((k) => `<span class="chip ${cls}">${k}</span>`).join("")
        : '<span class="chip">none</span>';
      $("matched").innerHTML = chips(data.matchedKeywords, "match");
      $("missing").innerHTML = chips(data.missingKeywords, "miss");
      $("suggestions").innerHTML = data.suggestions.map((s) => `<li>${s}</li>`).join("");
    };
  </script>
</body>
</html>
